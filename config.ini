; =============================================
; 高中教学文件自动归档程序 - 用户配置文件
; 请根据实际路径修改，等号后面不要加多余空格
; =============================================

[路径配置]
归档根目录 = D:\教学归档
; 想改学科？直接改这一行。默认：数学, 语文, 英语, 物理, 化学, 生物
科目文件夹列表 = 数学, 语文, 英语, 物理, 化学, 生物
无关文件夹 = D:\教学归档\其他无关文件
无法确定类别文件夹 = D:\教学归档\无法确定类别
日志文件夹 = D:\教学归档\程序日志

[AI配置]
AI接口地址 = http://your-ai-server.com/v1/chat/completions
API密钥 = sk-xxxxxxxxxxxxxxxxxxxxxxxx
模型名称 = qwen-turbo
失败重试等待秒数 = 60
最大重试次数 = 1

[规则配置]
热词未使用降级天数 = 7
冷词未使用删除天数 = 30
下载源文件保留小时数 = 1
可读文档扩展名 = .docx,.pptx,.pdf,.txt
压缩包扩展名 = .zip,.rar,.7z

[监控配置]
要监控的下载文件夹 = C:\Users\Administrator\Downloads
扫描间隔秒数 = 5
