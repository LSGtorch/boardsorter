; =============================================
; 高中教学文件自动归档程序 - 用户配置文件
; 请根据实际路径修改，等号后面不要加多余空格
; =============================================

[路径配置]
归档根目录 = D:\教学归档
; 想改学科？直接改这一行。默认：数学, 语文, 英语, 物理, 化学, 生物
科目文件夹列表 = 数学, 语文, 英语, 物理, 化学, 生物
无关文件夹 = D:\教学归档\其他无关文件
无法确定类别文件夹 = D:\教学归档\无法确定类别
日志文件夹 = D:\教学归档\程序日志

[AI配置]
AI接口地址 = https://api.deepseek.com/v1/chat/completions
API密钥 = YOUR_API_KEY_HERE
模型名称 = deepseek-v4-flash
系统提示词 = 你是中国高中教学文件归类专家。从文件名判断类别：【类别】数学,语文,英语,物理,化学,生物,无关文件,无法确定。【判断规则】1.文件名中模棱两可的词不作为判断依据，跳过继续找其他关键词。模棱两可词包括跨学科交叉词：糖类、蛋白质、油脂（化学和生物都有）、能量（物理和化学都有）、计算（数学和物理都有）等。2.只根据明确的学科关键词归类。【英语关键词】定语从句、状语从句、非谓语动词、倒装句、虚拟语气、主谓一致、被动语态、语法填空、七选五、改错、书面表达、完形填空、阅读理解、单词、句型、听力、作文模板。【各科关键词】物理：牛顿定律、加速度、受力分析、摩擦、动量、能量守恒、电磁感应、欧姆定律、电路、电场、磁场、热学、光学、声学、原子物理、物理实验。数学：三角函数、向量、导数、函数、数列、不等式、解析几何、立体几何、概率、统计、代数、方程。语文：文言文、古诗词、现代文阅读、作文、修辞、成语、文学常识。化学：元素周期表、化学反应、化学方程式、有机化学、无机化学、化学实验、化学反应与能量。生物：细胞分裂、基因、光合作用、遗传、生态系统、生物实验、有丝分裂、减数分裂。【注意事项】1.去掉年级（七年级/八年级/高一/高二/高三等）、通用词（课件/教案/试卷/练习/复习/期末/期中/月考）、文件后缀（.pptx/.docx/.pdf）后，没有明确学科关键词→"无法确定"。2.后缀永不进keywords。3."定语从句""状语从句"等英语语法术语→英语。4.糖类、蛋白质、油脂等化学/生物交叉词不作为归类依据。【输出严格JSON】{"category":"英语","keywords":["定语从句"]} 或 {"category":"无法确定","keywords":[]}
失败重试等待秒数 = 60
最大重试次数 = 1

[规则配置]
热词未使用降级天数 = 7
冷词未使用删除天数 = 30
下载源文件保留小时数 = 1
可读文档扩展名 = .docx,.pptx,.pdf,.txt
压缩包扩展名 = .zip,.rar,.7z

[监控配置]
要监控的下载文件夹 = C:\Users\Administrator\Downloads
扫描间隔秒数 = 5
